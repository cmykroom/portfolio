<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALLERY — MENGFEI YAN</title>
    <!-- 引用原始全局样式表 -->
    <link rel="stylesheet" href="../style.css">
    
    <style>
        /* 仅针对 Gallery 页面的隔离样式 */
        html, body.gallery-body {
            height: 100vh !important;
            overflow: hidden !important; /* 锁定视口，防止全局滚动 */
            margin: 0;
            padding: 0;
            background: #fff;
        }

        .objects-page {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0 15px; /* 严格对齐首页边距 */
            box-sizing: border-box;
        }

        /* 头部对齐优化 */
        .gallery-body .panel-header {
            flex-shrink: 0;
            height: 60px;
            display: flex !important;
            justify-content: space-between !important;
            align-items: flex-start !important;
            padding-top: 5px;
            border-bottom: 1px solid #d0d0d0;
        }

        /* 复用首页列宽比例，消除切换跳跃感 */
        .col-1 { flex: 0 0 32%; }
        .col-2 { flex: 0 0 48%; text-align: center; }
        .col-3 { flex: 0 0 20%; text-align: right; }

        /* 内容容器：横向滚动 */
        .viewport-wrapper {
            flex: 1;
            display: flex;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            margin: 80px 0; /* 增加上下边距产生空气感 */
        }
        .viewport-wrapper::-webkit-scrollbar { display: none; }

        /* 5x3 精确栅格 */
        .objects-grid {
            min-width: calc(100vw - 30px); 
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5列 */
            grid-template-rows: repeat(3, 1fr);    /* 3排 */
            column-gap: 60px; /* 调大列间距增加空气感 */
            row-gap: 40px;    /* 行间距 */
            scroll-snap-align: start;
            padding-right: 60px;
            box-sizing: border-box;
        }

        /* 单个项目样式 */
        .object-item {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .object-cover {
            width: 100%;
            aspect-ratio: 1 / 1; /* 统一比例 */
            background: #f2f2f2;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .object-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 居中裁切关键 */
            display: block;
        }

        .object-number {
            font-size: 11px;
            color: #000;
            letter-spacing: 0.05em;
        }

        /* 底部固定 */
        .gallery-body .panel-footer {
            height: 40px;
            border-top: 1px solid #d0d0d0;
            display: flex !important;
            align-items: center !important;
            flex-shrink: 0;
            background: #fff;
        }

        .footer-inner {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
    </style>
</head>
<body class="gallery-body">

<div class="objects-page">
    
    <header class="panel-header">
        <div class="col-1">
            <a href="../index.html" class="clickable">MENGFEI YAN ®</a>
        </div>
        <div class="col-2">
            <a href="../information.html" class="clickable">Information</a>
        </div>
        <div class="col-3">
            <a href="../index.html" class="clickable">Selected Work</a>
        </div>
    </header>

    <main class="viewport-wrapper" id="scroll-container">
        <!-- JS 注入位置 -->
    </main>

    <footer class="panel-footer">
        <div class="footer-inner">
            <div id="digital-clock">00:00:00</div>
            <div>
                <a href="#" class="clickable">IG</a>, 
                <a href="mailto:mengfeiyan11@gmail.com" class="clickable">Email</a>
            </div>
            <div>©2026 All Rights Reserved</div>
        </div>
    </footer>

</div>

<script src="gallery.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALLERY — MENGFEI YAN</title>
    <!-- 引用原始全局样式表 -->
    <link rel="stylesheet" href="../style.css">
    
    <style>
        /* 针对 Gallery 页面的隔离样式 */
        html, body.gallery-body {
            height: 100vh;
            overflow: hidden; 
            margin: 0;
            padding: 0;
            background: #fff;
        }

        .objects-page {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0 15px; 
            box-sizing: border-box;
        }

        /* 头部对齐 */
        .gallery-body .panel-header {
            flex-shrink: 0;
            height: 60px;
            display: flex !important;
            justify-content: space-between !important;
            align-items: flex-start !important;
            padding-top: 5px;
            border-bottom: 1px solid #d0d0d0;
        }

        .col-1 { flex: 0 0 32%; }
        .col-2 { flex: 0 0 48%; text-align: center; }
        .col-3 { flex: 0 0 20%; text-align: right; }

        /* PC端：纵向翻页滑动 + 居中 */
        .viewport-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
            justify-content: center; 
        }
        .viewport-wrapper::-webkit-scrollbar { display: none; }

        /* PC端：5x3 栅格 */
        .objects-grid {
            width: 100%;
            min-height: 100%; 
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(3, 1fr);
            column-gap: 60px;
            row-gap: 40px;
            scroll-snap-align: start;
            box-sizing: border-box;
            align-content: center; 
            padding: 40px 0; 
        }

        .object-item {
            display: flex;
            flex-direction: column;
        }

        .object-cover {
            width: 100%;
            aspect-ratio: 1 / 1; 
            background: #f2f2f2;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .object-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        .object-number {
            font-size: 11px;
            color: #000;
        }

        /* 底部固定 */
        .gallery-body .panel-footer {
            height: 40px;
            border-top: 1px solid #d0d0d0;
            display: flex !important;
            align-items: center !important;
            flex-shrink: 0;
            background: #fff;
        }

        .footer-inner {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        /* ============================================================
           MOBILE 适配：2张一行，不限高度，正常滚动
           ============================================================ */
        @media (max-width: 800px) {
            html, body.gallery-body {
                height: auto !important; /* 解除高度锁定 */
                overflow: auto !important; /* 允许正常垂直滚动 */
            }

            .objects-page {
                height: auto !important;
                padding: 0 15px;
            }

            .viewport-wrapper {
                height: auto !important;
                overflow: visible !important; /* 关闭手机端的吸附和溢出控制 */
                scroll-snap-type: none !important;
                margin: 20px 0;
            }

            .objects-grid {
                display: grid !important;
                grid-template-columns: repeat(2, 1fr) !important; /* 手机端：2张一行 */
                grid-template-rows: none !important; /* 手机端：取消3排限制 */
                column-gap: 20px !important;
                row-gap: 30px !important;
                min-height: auto !important;
                padding: 10px 0 60px 0 !important;
            }

            .gallery-body .panel-footer {
                position: relative; /* 手机端底部随页面滚动 */
                margin-top: 20px;
            }
        }
    </style>
</head>
<body class="gallery-body">

<div class="objects-page">
    <header class="panel-header">
        <div class="col-1"><a href="../index.html" class="clickable">MENGFEI YAN ®</a></div>
        <div class="col-2"><a href="../information.html" class="clickable">Information</a></div>
        <div class="col-3"><a href="../index.html" class="clickable">Selected Work</a></div>
    </header>

    <main class="viewport-wrapper" id="scroll-container"></main>

    <footer class="panel-footer">
        <div class="footer-inner">
            <div id="digital-clock">00:00:00</div>
            <div><a href="#" class="clickable">IG</a>, <a href="mailto:mengfeiyan11@gmail.com" class="clickable">Email</a></div>
            <div>©2026 All Rights Reserved</div>
        </div>
    </footer>
</div>

<script src="gallery.js"></script>
</body>
</html>

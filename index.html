<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MENGFEI YAN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-container">

    <!-- 左侧面板：严格列表对齐 -->
    <aside class="left-panel">
        <header class="panel-header left-row">
            <div class="col-1 clickable" onclick="showGallery()">MENGFEI YAN ®</div>
            <div class="col-2 top-links">
                <span class="clickable" onclick="showInfo()">Information</span>
                <a href="gallery/">Gallery</a>
            </div>
            <div class="col-3"></div>
        </header>

        <div class="scroll-content">
            <div class="table-head left-row">
                <div class="col-1">Client</div>
                <div class="col-2">Project</div>
                <div class="col-3">Year</div>
            </div>
            
            <!-- 动态项目列表容器 -->
            <div id="js-project-list">
                <!-- 注意：JS生成的每一行需包含 class="project-item left-row" -->
            </div>
        </div>

        <!-- 装饰图标 -->
        <div class="left-panel-corner-img">
            <img src="https://raw.githubusercontent.com/cmykroom/portfolio/main/images/icon1.png" alt="Icon">
        </div>

        <!-- 左侧页脚 -->
        <footer class="panel-footer left-row">
            <div class="col-1" id="timer">00:00:00</div>
            <div class="col-2">
                <a href="#">IG</a>, <a href="mailto:mengfeiyan11@gmail.com">Email</a>
            </div>
            <div class="col-3"></div>
        </footer>
    </aside>

    <!-- 右侧面板：作品展示区 -->
    <main class="right-panel">
        <div class="scroll-content view-fade show" id="gal">

            <!-- 首页视图 -->
            <div id="gallery-view">
                <header class="panel-header">
                    <div class="header-title">Selected Work</div>
                    <!-- 移动端组件：在桌面端会被 CSS 的 desktop-hide 彻底隐藏 -->
                    <div class="mobile-links desktop-hide">
                        <span class="clickable" onclick="showMobileList()">List</span>
                    </div>
                </header>

                <div id="js-gallery-content">
                    <!-- 这里是图片流，不再受 left-row 限制，图片宽度 100% -->
                </div>
            </div>

            <!-- 项目详情视图 (默认隐藏) -->
            <div id="detail-view" style="display:none;">
                <header class="panel-header">
                    <div class="header-title">Selected Work</div>
                    <div class="header-nav clickable" onclick="showGallery()">Index</div>
                </header>

                <!-- 详情 Meta -->
                <div class="item-meta left-row">
                    <div class="col-1" id="d-client"></div>
                    <div class="col-2" id="d-project"></div>
                    <div class="col-3" id="d-year"></div>
                </div>

                <div class="image-container">
                    <img src="" id="d-img">
                </div>

                <div class="description-section">
                    <div class="info-tags"><ul id="d-tags"></ul></div>
                    <div class="info-text" id="d-text"></div>
                </div>
            </div>

            <!-- 底部页脚：横线与左侧严格水平对齐 -->
            <footer class="gallery-footer">
                <div class="footer-inner">
                    <a href="#" onclick="scrollToTop();return false;">↑ Top</a>
                    <span>©2026 All Rights Reserved</span>
                </div>
            </footer>

        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>

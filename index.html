<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MENGFEI YAN</title>

<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#efefef;

    color:#111;

    font-family:
    Helvetica,
    Arial,
    sans-serif;

    overflow-x:hidden;
}

/* =========================
   HERO
========================= */

.hero{

    padding:120px 40px 80px 40px;
}

.hero h1{

    font-size:72px;

    font-weight:500;

    letter-spacing:-2px;

    margin-bottom:10px;
}

.hero p{

    font-size:28px;

    opacity:.7;
}

/* =========================
   NAV
========================= */

.nav{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 40px;

    margin-top:120px;

    margin-bottom:30px;

    font-size:18px;
}

.nav-center{

    display:flex;

    gap:40px;
}

/* =========================
   TABLE
========================= */

.project-table{

    width:100%;

    border-top:1px solid #ccc;
}

.table-row{

    display:grid;

    grid-template-columns:
    220px
    1fr
    120px;

    padding:14px 40px;

    border-bottom:1px solid #d8d8d8;

    font-size:18px;
}

.table-row.header{

    opacity:.6;
}

/* =========================
   IMAGE SECTION
========================= */

.feature-image{

    width:100%;

    padding:40px;
}

.feature-image img{

    width:100%;

    display:block;
}

/* =========================
   FLOATING ROTATE CIRCLE
========================= */

.circle-wrap{

    position:fixed;

    right:40px;
    bottom:40px;

    width:220px;
    height:220px;

    z-index:99999;

    pointer-events:none;

    mix-blend-mode:difference;
}

/* SVG */

.circle-svg{

    width:100%;
    height:100%;

    overflow:visible;
}

/* ROTATE */

.rotating-group{

    transform-origin:250px 250px;

    animation: circleRotate 40s linear infinite;
}

/* TEXT */

.circle-text{

    font-size:20px;

    letter-spacing:8px;

    fill:white;

    font-weight:300;

    font-family:
    Helvetica,
    Arial,
    sans-serif;
}

/* ANIMATION */

@keyframes circleRotate{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

    .hero{

        padding:60px 20px;
    }

    .hero h1{

        font-size:42px;
    }

    .hero p{

        font-size:18px;
    }

    .nav{

        flex-direction:column;

        align-items:flex-start;

        gap:20px;

        padding:0 20px;
    }

    .table-row{

        grid-template-columns:
        100px
        1fr
        60px;

        font-size:14px;

        padding:12px 20px;
    }

    .feature-image{

        padding:20px;
    }

    .circle-wrap{

        width:160px;
        height:160px;

        right:20px;
        bottom:20px;
    }

    .circle-text{

        font-size:14px;

        letter-spacing:6px;
    }
}

</style>
</head>

<body>

<!-- =========================
     HERO
========================= -->

<section class="hero">

    <h1>MU+ ARCHIVE</h1>

    <p>Portfolio Website</p>

</section>

<!-- =========================
     NAV
========================= -->

<nav class="nav">

    <div>
        MENGFEI YAN ®
    </div>

    <div class="nav-center">

        <span>Information</span>

        <span>Gallery</span>

        <span>Selected Work</span>

    </div>

</nav>

<!-- =========================
     TABLE
========================= -->

<section class="project-table">

    <div class="table-row header">

        <div>Client</div>

        <div>Project</div>

        <div>Year</div>

    </div>

    <div class="table-row">

        <div>MT_01</div>

        <div>VISUAL_INVITATION</div>

        <div>2025</div>

    </div>

    <div class="table-row">

        <div>EXP_03</div>

        <div>SUMMERTIME</div>

        <div>2025</div>

    </div>

    <div class="table-row">

        <div>KN_01</div>

        <div>SNAKE_YEAR_LIMITED_EDITION</div>

        <div>2024</div>

    </div>

    <div class="table-row">

        <div>AW_02</div>

        <div>UNBELIEVABLE_ATLAS</div>

        <div>2022</div>

    </div>

    <div class="table-row">

        <div>AW_01</div>

        <div>MOVE</div>

        <div>2021</div>

    </div>

</section>

<!-- =========================
     IMAGE
========================= -->

<section class="feature-image">

    <img src="https://raw.githubusercontent.com/cmykroom/portfolio/main/images/cover1.jpg">

</section>

<!-- =========================
     FLOATING ROTATE CIRCLE
========================= -->

<div class="circle-wrap">

    <svg
        class="circle-svg"
        viewBox="0 0 500 500"
    >

        <defs>

            <path
                id="circlePath"
                d="
                M 250 250
                m -90 0
                a 90 90 0 1 1 180 0
                a 90 90 0 1 1 -180 0
                "
            />

        </defs>

        <g class="rotating-group">

            <text class="circle-text">

                <textPath href="#circlePath">

                    MU+ ARCHIVE • MU+ ARCHIVE •

                </textPath>

            </text>

        </g>

    </svg>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MENGFEI YAN - Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <!-- 左侧索引栏 (手机端会隐藏) -->
        <aside class="left-panel">
            <div class="panel-header">
                <div class="header-content">
                    <div class="brand">MENGFEI YAN</div>
                    <!-- 这里增加了对齐容器 -->
                    <div class="info-label"><span>Information</span></div>
                </div>
            </div>

            <div class="scroll-content">
                <table class="project-table">
                    <thead>
                        <tr>
                            <th class="col-client">Client</th>
                            <th class="col-project">Project</th>
                            <th class="col-year">Year</th>
                        </tr>
                    </thead>
                    <tbody id="index-list">
                        <!-- 使用 JS 渲染或手动添加，结构保持一致 -->
                        <tr data-target="p1">
                            <td class="col-client"><span>SED_DO</span></td>
                            <td class="col-project">Ref. R/XTR-082</td>
                            <td class="col-year">2049</td>
                        </tr>
                        <tr data-target="p2">
                            <td class="col-client"><span>SED_DO</span></td>
                            <td class="col-project">R/PRT-017</td>
                            <td class="col-year">2048</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="panel-footer">
                <div class="footer-left-wrap">
                    <span id="timer">00:00:00</span>
                    <span class="social">IG, Email</span>
                </div>
            </div>
        </aside>

        <!-- 右侧展示栏 -->
        <main class="right-panel">
            <div class="panel-header">
                <div class="header-content">
                    <div class="work-label">Selected Work</div>
                </div>
            </div>

            <div class="scroll-content" id="gal">
                <section class="gallery-item" id="p1">
                    <div class="item-meta">
                        <span class="m-client">SED_DO</span>
                        <span class="m-project">Ref. R/XTR-082</span>
                        <span class="m-year">2049</span>
                    </div>
                    <div class="image-container">
                        <span class="plus top-left">+</span><span class="plus top-right">+</span>
                        <span class="plus bottom-left">+</span><span class="plus bottom-right">+</span>
                    </div>
                </section>

                <footer class="gallery-footer">
                    <div class="footer-inner">
                        <a href="#" id="back-to-top">↑ Top</a>
                        <span class="copyright">©2047 All Rights Reserved</span>
                    </div>
                </footer>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>

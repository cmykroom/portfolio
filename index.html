<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MENGFEI YAN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <!-- 左侧索引栏 -->
        <aside class="left-panel">
            <header class="panel-header">
                <div class="grid-row">
                    <div class="col-1">MENGFEI YAN</div>
                    <div class="col-2">Information</div>
                </div>
            </header>

            <div class="scroll-content">
                <!-- 模拟表格头部 -->
                <div class="grid-row table-head">
                    <div class="col-1">Client</div>
                    <div class="col-2">Project</div>
                    <div class="col-3">Year</div>
                </div>
                
                <!-- 项目列表 -->
                <div class="project-list">
                    <div class="grid-row project-item" onclick="to('p1')">
                        <div class="col-1">SED_DO</div>
                        <div class="col-2">Ref. R/XTR-082</div>
                        <div class="col-3">2049</div>
                    </div>
                    <div class="grid-row project-item" onclick="to('p2')">
                        <div class="col-1">SED_DO</div>
                        <div class="col-2">R/PRT-017</div>
                        <div class="col-3">2048</div>
                    </div>
                    <!-- 更多项目... -->
                </div>
            </div>

            <footer class="panel-footer">
                <div class="grid-row">
                    <div class="col-1" id="timer">00:00:00</div>
                    <div class="col-2">IG, Email</div>
                </div>
            </footer>
        </aside>

        <!-- 右侧展示栏 -->
        <main class="right-panel">
            <header class="panel-header">
                <div class="grid-row">
                    <div class="col-full">Selected Work</div>
                </div>
            </header>

            <div class="scroll-content" id="gal">
                <section class="gallery-item" id="p1">
                    <div class="item-meta">
                        <div class="col-1">SED_DO</div>
                        <div class="col-2">Ref. R/XTR-082</div>
                        <div class="col-3">2049</div>
                    </div>
                    <div class="image-container">
                        <span class="plus top-left">+</span><span class="plus top-right">+</span>
                        <span class="plus bottom-left">+</span><span class="plus bottom-right">+</span>
                    </div>
                </section>

                <footer class="gallery-footer">
                    <div class="footer-inner">
                        <a href="#" onclick="scrollToTop()">↑ Top</a>
                        <span>©2047 All Rights Reserved</span>
                    </div>
                </footer>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>

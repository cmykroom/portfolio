<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简作品集 - Cargo 风格</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="logo"><a href="#">YOUR NAME / STUDIO</a></div>
        <ul class="nav-links">
            <li><a href="#">Work</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- 主体网格布局 -->
    <main class="container">
        <section class="gallery">
            <!-- 每一个 gallery-item 代表一张图片/一个项目 -->
            <div class="gallery-item">
                <img src="https://via.placeholder.com/600x800" alt="Project 1">
                <div class="caption">Project Title 01</div>
            </div>
            <div class="gallery-item">
                <img src="https://via.placeholder.com/600x600" alt="Project 2">
                <div class="caption">Project Title 02</div>
            </div>
            <div class="gallery-item">
                <img src="https://via.placeholder.com/600x900" alt="Project 3">
                <div class="caption">Project Title 03</div>
            </div>
            <div class="gallery-item">
                <img src="https://via.placeholder.com/600x700" alt="Project 4">
                <div class="caption">Project Title 04</div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2023 Built with Style</p>
    </footer>

</body>
</html>
